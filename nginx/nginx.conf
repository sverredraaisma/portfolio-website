events {}

http {
    sendfile on;
    keepalive_timeout 65;

    # HSTS is only safe when we *know* the client is on TLS — otherwise a
    # one-time HTTP visitor would get pinned to https://localhost and
    # lock themselves out. Cloudflare / Caddy / whichever TLS terminator
    # sits in front of nginx forwards the original scheme via
    # X-Forwarded-Proto; we mirror that into a value, default empty.
    map $http_x_forwarded_proto $hsts_header {
        https   "max-age=31536000; includeSubDomains";
        default "";
    }

    # Match the Kestrel/Nuxt body cap so the proxy doesn't truncate uploads
    # before they reach the backend's stricter per-method checks.
    client_max_body_size 10M;

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8080;
    }

    server {
        listen 80;
        server_name _;

        # Don't add identifying headers to outbound responses.
        server_tokens off;

        # Content Security Policy. Applied at the server level so every
        # response (frontend HTML, RPC JSON, RSS, etc) carries it.
        #
        # 'unsafe-inline' on script-src and style-src is reluctant — Nuxt's
        # SSR hydration emits an inline <script> with the serialised payload
        # and Vue scoped styles get injected as <style>. A nonce-based
        # policy needs the nuxt-security module (or hand-rolled hooks) and
        # nginx's sub_filter on every response. The tighter directives below
        # still close the most-exploited vectors:
        #   frame-ancestors 'none'   — no clickjacking
        #   object-src 'none'        — no Flash/PDF embeds
        #   base-uri 'self'          — base-tag URL hijacking blocked
        #   form-action 'self'       — POST exfiltration to other origins blocked
        # connect-src + img-src stay 'self' + data: (data: for the QR code
        # and any future inline SVG); media-src/font-src 'self'.
        add_header Content-Security-Policy
            "default-src 'self'; \
             script-src 'self' 'unsafe-inline'; \
             style-src 'self' 'unsafe-inline'; \
             img-src 'self' data: blob: https://*.tile.openstreetmap.org; \
             font-src 'self'; \
             connect-src 'self'; \
             frame-ancestors 'none'; \
             base-uri 'self'; \
             form-action 'self'; \
             object-src 'none'"
            always;
        # The /account "share my browser location" button calls
        # navigator.geolocation, which Permissions-Policy must explicitly
        # allow on first-party context. microphone/camera stay disabled.
        add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
        # Empty string emits no header — the `add_header` directive skips
        # it. So HTTP-only dev environments stay free of HSTS.
        add_header Strict-Transport-Security $hsts_header always;

        # ---- API ------------------------------------------------------------
        # Backend lives under /api on the public origin. The trailing slash on
        # proxy_pass strips the /api prefix so the backend keeps its existing
        # routes (/rpc, /media/*) — no backend code change needed.
        location /api/ {
            proxy_pass http://backend/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # Don't let nginx buffer streaming responses (none yet, but cheap).
            proxy_buffering off;
            proxy_read_timeout 60s;
        }

        # ---- Well-known crawler URLs ----------------------------------------
        # RSS feed, sitemap, and robots.txt all live on the backend (built
        # from the post table) but crawlers expect them at the root of the
        # public origin, so nginx hoists them here.
        location = /rss.xml      { proxy_pass http://backend/rss.xml;      proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-Host $host; }
        location = /sitemap.xml  { proxy_pass http://backend/sitemap.xml;  proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-Host $host; }
        location = /robots.txt   { proxy_pass http://backend/robots.txt;   proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-Host $host; }
        location = /health        { proxy_pass http://backend/health;        proxy_http_version 1.1; proxy_set_header Host $host; access_log off; }
        location = /health/live   { proxy_pass http://backend/health/live;   proxy_http_version 1.1; proxy_set_header Host $host; access_log off; }
        location = /health/ready  { proxy_pass http://backend/health/ready;  proxy_http_version 1.1; proxy_set_header Host $host; access_log off; }

        # ---- Frontend (Nuxt) ------------------------------------------------
        # Catch-all. Includes WebSocket upgrade in case Nuxt's HMR-over-WS or
        # any future websocket route shows up.
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }
    }
}
