name: ci

on:
  push:
    branches: [main]
    # Version tags (e.g. v1.2.3) trigger a release build of the docker images.
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (.NET tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        working-directory: backend
        run: dotnet restore
      - name: Build
        working-directory: backend
        run: dotnet build --no-restore --configuration Release
      - name: Test (with coverage)
        working-directory: backend
        run: |
          dotnet test --no-build --configuration Release \
            --logger "trx;LogFileName=backend-test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/**/TestResults/*.trx
          retention-days: 7
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/**/TestResults/**/coverage.cobertura.xml
          retention-days: 7

  frontend:
    name: frontend (vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: '10'
          run_install: false
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Type-check
        working-directory: frontend
        run: pnpm typecheck
      - name: Test (with coverage)
        working-directory: frontend
        run: pnpm test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7
      - name: Build
        working-directory: frontend
        run: pnpm build

  # Publishes container images to GHCR after the test jobs pass.
  # Runs only for pushes to main and for version tags — never for PRs, since
  # PRs from forks can't read the package-write GITHUB_TOKEN scope and we
  # don't want to publish per-PR images either.
  images:
    name: docker images (build + push)
    needs: [backend, frontend]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Computes tags + labels from the git ref. Pushes to main produce
      # `:main` and `:sha-<short>`; a `vX.Y.Z` tag also produces `:X.Y.Z`,
      # `:X.Y`, and `:latest`.
      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
