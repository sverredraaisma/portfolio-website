events {}

http {
    sendfile on;
    keepalive_timeout 65;

    # Match the Kestrel/Nuxt body cap so the proxy doesn't truncate uploads
    # before they reach the backend's stricter per-method checks.
    client_max_body_size 10M;

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8080;
    }

    server {
        listen 80;
        server_name _;

        # Don't add identifying headers to outbound responses.
        server_tokens off;

        # ---- API ------------------------------------------------------------
        # Backend lives under /api on the public origin. The trailing slash on
        # proxy_pass strips the /api prefix so the backend keeps its existing
        # routes (/rpc, /media/*) — no backend code change needed.
        location /api/ {
            proxy_pass http://backend/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # Don't let nginx buffer streaming responses (none yet, but cheap).
            proxy_buffering off;
            proxy_read_timeout 60s;
        }

        # ---- Frontend (Nuxt) ------------------------------------------------
        # Catch-all. Includes WebSocket upgrade in case Nuxt's HMR-over-WS or
        # any future websocket route shows up.
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }
    }
}
