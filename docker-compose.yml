services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    # Postgres is only reachable inside the compose network — no host port.
    # Add a `ports: ["5432:5432"]` block here temporarily if you need to
    # connect from a local SQL client.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Trust X-Forwarded-* from any proxy on the docker network. The container
      # is not exposed to the host, so the only client is nginx.
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=portfolio;Username=portfolio;Password=portfolio
      # No default — compose will refuse to start until JWT_KEY is set in your
      # shell or in a .env next to docker-compose.yml. Generate one with e.g.
      #   openssl rand -base64 48
      Jwt__Key: "${JWT_KEY:?JWT_KEY must be set to a >= 32 byte secret. Generate one with openssl rand -base64 48}"
      # Same-origin: emails point at the public host (nginx). Override
      # PUBLIC_ORIGIN in .env for production deployments.
      Email__VerifyUrlBase: ${PUBLIC_ORIGIN:-http://localhost}/verify
      Email__ResetUrlBase: ${PUBLIC_ORIGIN:-http://localhost}/reset-password
      Email__EmailChangeUrlBase: ${PUBLIC_ORIGIN:-http://localhost}/confirm-email-change
      # CORS is now a no-op (browser always hits the same origin via nginx),
      # but the policy still applies if someone connects directly to :8080.
      Cors__FrontendOrigin: ${PUBLIC_ORIGIN:-http://localhost}
      Email__SmtpHost: ${SMTP_HOST:-mailpit}
      Email__SmtpPort: ${SMTP_PORT:-1025}
      Email__From: ${SMTP_FROM:-noreply@example.com}
      # WebAuthn relying-party id is the registrable domain only (no scheme,
      # no port). For dev, the default 'localhost' works because the browser
      # treats it specially. For production set both PASSKEY_RP_ID and
      # PASSKEY_ORIGINS to match your hostname.
      Passkey__RpId: ${PASSKEY_RP_ID:-localhost}
      Passkey__RpName: ${PASSKEY_RP_NAME:-sverre.dev}
      Passkey__Origins__0: ${PUBLIC_ORIGIN:-http://localhost}
      # Nominatim insists on a real User-Agent (with a contact address);
      # missing UA → 403 from the public service.
      Location__UserAgent: ${LOCATION_USER_AGENT:-PortfolioWebsite (set LOCATION_USER_AGENT in .env)}
      # Seeded on first boot when the Users table is empty. Override these
      # in .env if you fork the project — otherwise the very first boot
      # creates an admin under the upstream owner's email, which the
      # password-reset flow can't deliver to you.
      Admin__SeedUsername: ${ADMIN_USERNAME:-opperautist}
      Admin__SeedEmail:    ${ADMIN_EMAIL:-sverre@draaisma.dev}
    volumes:
      - backend_media:/app/media
      # Falcon-512 signing keypair, generated on first boot. Persisted so
      # signatures survive container restarts and so the public key stays
      # stable for verifiers.
      - backend_keys:/app/keys
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Browser-side: relative URL on the same origin as the page. CORS gone.
      NUXT_PUBLIC_API_BASE: /api
      # SSR-side: keep the request on the docker network instead of bouncing
      # back out through nginx.
      NUXT_API_BASE_INTERNAL: http://backend:8080
      # Pinned so canonical / og:url can't be poisoned by a hostile Host
      # header. Same value PUBLIC_ORIGIN gets so emails and canonical
      # links agree.
      NUXT_PUBLIC_SITE_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}

  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${PUBLIC_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  # Local SMTP catcher so verification emails are visible in dev.
  # Web UI: http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: portfolio-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"

volumes:
  postgres_data:
  backend_media:
  backend_keys:
